    <meta property="og:type" content="website" />

    <meta property="og:title" content="Chiappital" />

    <!-- Twitter -->

    <!-- Google Fonts - Unbounded -->

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <style>
        body { margin: 0; background: #030712; }
        .initial-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          color: white;
        }
        .initial-loader img {
          width: 80px;
          height: 80px;
          margin-bottom: 20px;
          animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
          0% { transform: scale(0.9); opacity: 0.8; }
          50% { transform: scale(1.05); opacity: 1; }
          100% { transform: scale(0.9); opacity: 0.8; }
        }
      </style>
      <div class="initial-loader">
        <img src="%PUBLIC_URL%/logo-simple-trade.png" alt="Chiappital Logo" />
        <h2 style="margin: 0; font-weight: 500; letter-spacing: 1px;">Cargando Chiappital...</h2>
      </div>
    </div>
